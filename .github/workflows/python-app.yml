name: Python application (Windows Build)

on:
  push:
    branches: [ "main", "master" ] # Слушаем обе на всякий случай
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_NAME: change-selection-color
      PYTHON_VERSION: "3.12" # Используем стабильную версию
      ICON_PATH: app/src/icon.ico
      RELEASE_NAME: "Release v0.0.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Обновил до v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip' # Ускоряет повторные запуски

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyaudiodevice
          # Если есть requirements.txt, раскомментируй строку ниже:
          # pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller app/main.py --onefile --name "${{ env.APP_NAME }}" --icon "${{ env.ICON_PATH }}" --collect-all pyaudiodevice

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' # Создавать релиз только при пуше в мастер
        with:
          tag_name: v0.0.0
          name: ${{ env.RELEASE_NAME }}
          draft: true
          files: dist/${{ env.APP_NAME }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
